<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 文档纸张（左上、左下、右下圆角，右上直角接折角） -->
  <path d="M96 64 Q96 32 128 32 L304 32 L416 144 L416 448 Q416 480 384 480 L128 480 Q96 480 96 448 Z" fill="#f8f9fa" stroke="#d0d5dd" stroke-width="4" stroke-linejoin="round"/>
  <!-- 折角 -->
  <path d="M304 32 L304 112 Q304 144 336 144 L416 144 Z" fill="#e4e7ec" stroke="#d0d5dd" stroke-width="4" stroke-linejoin="round"/>
  <!-- 文本行装饰 -->
  <rect x="136" y="180" width="160" height="12" rx="6" fill="#d0d5dd"/>
  <rect x="136" y="210" width="120" height="12" rx="6" fill="#d0d5dd"/>
  <rect x="136" y="240" width="140" height="12" rx="6" fill="#d0d5dd"/>
  <!-- 终端区域背景 -->
  <rect x="136" y="320" width="240" height="120" rx="8" fill="#1e1e2e"/>
  <!-- 提示符 > -->
  <text x="160" y="388" font-family="monospace" font-size="48" font-weight="bold" fill="#a6e3a1">⟩</text>
  <!-- 光标 _ -->
  <rect x="200" y="368" width="28" height="6" rx="2" fill="#cdd6f4">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
